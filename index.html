<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lukarix Dinkulturu sızdırma pdf</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    overflow: hidden;
}

/* LOGIN */
.login {
    position: absolute;
    top:50%;
    left:50%;
    transform: translate(-50%,-50%);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    text-align:center;
    backdrop-filter: blur(10px);
}

input {
    padding:10px;
    border-radius:10px;
    border:none;
}

button {
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:cyan;
}

/* VIEWER */
#viewer {
    display:none;
    height:100vh;
    overflow:auto;
    text-align:center;
}

canvas {
    margin:10px;
    box-shadow:0 0 15px black;
}

/* TOP BAR */
.toolbar {
    position:fixed;
    top:0;
    width:100%;
    background:black;
    color:white;
    padding:10px;
}
</style>
</head>

<body>

<div class="login" id="loginBox">
    <h2 style="color:white;">🔐Sızdırma senaryo PDF Giriş</h2>
    <input type="password" id="pass" placeholder="Şifre">
    <br>
    <button onclick="login()">Giriş</button>
    <p id="err" style="color:red;"></p>
</div>

<div id="viewer">
    <div class="toolbar">
        <button onclick="prevPage()">⬅</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">➡</button>
        <button onclick="zoomIn()">🔍+</button>
        <button onclick="zoomOut()">🔍-</button>
    </div>
    <div id="pdfContainer"></div>
</div>

<script>
let pdfDoc = null;
let pageNum = 1;
let scale = 1.5;

function login() {
    if(document.getElementById("pass").value === "LukarixYZ") {
        document.getElementById("loginBox").style.display="none";
        document.getElementById("viewer").style.display="block";
        loadPDF();
    } else {
        document.getElementById("err").innerText="Yanlış şifre!";
    }
}

function loadPDF() {
    const url = "Dinkulturu 7. sınıf 2. donem 1. yazılı(____________Koleji.pdf";

    pdfjsLib.getDocument(url).promise.then(pdf => {
        pdfDoc = pdf;
        renderPage(pageNum);
    });
}

function renderPage(num) {
    pdfDoc.getPage(num).then(page => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const viewport = page.getViewport({scale: scale});
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        document.getElementById("pdfContainer").innerHTML="";
        document.getElementById("pdfContainer").appendChild(canvas);

        page.render({canvasContext: ctx, viewport: viewport});

        document.getElementById("pageInfo").innerText =
            num + " / " + pdfDoc.numPages;
    });
}

function nextPage() {
    if(pageNum < pdfDoc.numPages) {
        pageNum++;
        renderPage(pageNum);
    }
}

function prevPage() {
    if(pageNum > 1) {
        pageNum--;
        renderPage(pageNum);
    }
}

function zoomIn() {
    scale += 0.2;
    renderPage(pageNum);
}

function zoomOut() {
    scale -= 0.2;
    renderPage(pageNum);
}
</script>

</body>
</html>
